<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Evidence dan bukti sumber data pelacakan alumni">
  <title>Evidence / Bukti — Sistem Pelacakan Alumni</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>🎓 Alumni Tracker</h1>
        <p>Sistem Pelacakan Alumni</p>
      </div>
      <nav class="sidebar-nav">
        <a href="/index.html" class="nav-link">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="/input.html" class="nav-link">
          <span class="nav-icon">➕</span> Input Alumni
        </a>
        <a href="/tracking.html" class="nav-link">
          <span class="nav-icon">🔍</span> Tracking Alumni
        </a>
        <a href="/evidence.html" class="nav-link active">
          <span class="nav-icon">📋</span> Evidence / Bukti
        </a>
        <a href="/history.html" class="nav-link">
          <span class="nav-icon">📜</span> Riwayat Tracking
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h2>Evidence / Bukti Sumber Data</h2>
        <p>Daftar bukti sumber data dari pencarian kandidat alumni</p>
      </div>

      <!-- Filter -->
      <div class="filter-bar mb-24">
        <select class="form-control" id="filterAlumni" style="max-width:250px;">
          <option value="">Semua Alumni</option>
        </select>
        <select class="form-control" id="filterSource" style="max-width:200px;">
          <option value="">Semua Sumber</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="Google Scholar">Google Scholar</option>
          <option value="ResearchGate">ResearchGate</option>
          <option value="Facebook">Facebook</option>
          <option value="Twitter/X">Twitter/X</option>
          <option value="GitHub">GitHub</option>
        </select>
        <select class="form-control" id="filterStatus" style="max-width:200px;">
          <option value="">Semua Status</option>
          <option value="verified">Verified</option>
          <option value="pending">Pending</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <!-- Evidence Table -->
      <div class="card animate-in">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Alumni</th>
                <th>Sumber</th>
                <th>Kandidat</th>
                <th>Informasi</th>
                <th>Skor</th>
                <th>Tipe</th>
                <th>Status</th>
                <th>Link</th>
              </tr>
            </thead>
            <tbody id="evidenceTable">
              <tr>
                <td colspan="8" class="text-center" style="padding: 40px; color: var(--text-muted);">
                  Memuat data...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/evidence.js"></script>
</body>
</html>
